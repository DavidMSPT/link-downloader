<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Downloader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222e;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-dim: #8888a0;
      --accent: #6c5ce7;
      --accent-hover: #7c6cf7;
      --green: #00b894;
      --red: #e74c3c;
      --orange: #f39c12;
      --blue: #3498db;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header h1 span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
    }

    .status-dot.connected { background: var(--green); }

    /* Search */
    .search-bar {
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .search-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .search-bar input:focus { border-color: var(--accent); }

    .search-bar select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .game-count {
      color: var(--text-dim);
      font-size: 13px;
      white-space: nowrap;
    }

    /* Layout */
    .layout {
      display: flex;
      height: calc(100vh - 120px);
    }

    /* Game list */
    .game-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .game-card:hover { border-color: var(--accent); background: var(--surface2); }
    .game-card.selected { border-color: var(--accent); background: var(--surface2); }

    .game-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .game-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .game-size { color: var(--blue); font-weight: 500; }

    .host-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .host-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Download panel */
    .download-panel {
      width: 420px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .panel-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .host-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .host-option:hover { border-color: var(--accent); }
    .host-option.selected { border-color: var(--accent); background: rgba(108, 92, 231, 0.1); }

    .host-option-name { font-weight: 500; font-size: 14px; }
    .host-option-count { color: var(--text-dim); font-size: 12px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Active downloads */
    .downloads-section {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }

    .downloads-section.visible { display: block; }

    .downloads-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .downloads-header h3 { font-size: 14px; font-weight: 600; }

    .dl-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .dl-item-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .dl-file {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .dl-file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-dim);
    }

    .dl-file-status { font-weight: 500; }
    .dl-file-status.downloading { color: var(--blue); }
    .dl-file-status.done { color: var(--green); }
    .dl-file-status.error { color: var(--red); }
    .dl-file-status.skipped { color: var(--orange); }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.2s;
    }

    .dl-complete {
      color: var(--green);
      font-size: 12px;
      font-weight: 500;
      margin-top: 8px;
    }

    .dl-error {
      color: var(--red);
      font-size: 12px;
      margin-top: 8px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-dim);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1><span>Link</span> Downloader</h1>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <span style="font-size:12px;color:var(--text-dim)" id="statusText">Connecting...</span>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search games..." autocomplete="off">
  <select id="hostFilter">
    <option value="">All hosts</option>
  </select>
  <span class="game-count" id="gameCount"></span>
</div>

<div class="layout">
  <div class="game-list" id="gameList">
    <div class="loading"><div class="spinner"></div>Loading games...</div>
  </div>

  <div class="download-panel" id="downloadPanel">
    <div class="empty-state" id="panelEmpty">Select a game to download</div>
    <div id="panelContent" style="display:none">
      <div class="panel-title" id="panelTitle"></div>

      <div class="panel-section">
        <div class="panel-label">Size</div>
        <div id="panelSize" style="font-size:14px"></div>
      </div>

      <div class="panel-section">
        <div class="panel-label">Select Host</div>
        <div id="hostOptions"></div>
      </div>

      <button class="btn btn-primary" id="downloadBtn" disabled>Download</button>
    </div>
  </div>
</div>

<div class="downloads-section" id="downloadsSection">
  <div class="downloads-header">
    <h3>Active Downloads</h3>
  </div>
  <div id="downloadsList"></div>
</div>

<script>
const state = {
  games: [],
  filtered: [],
  selected: null,
  selectedHost: null,
  downloads: {},
  ws: null,
};

// --- WebSocket ---
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  state.ws = new WebSocket(`${protocol}//${location.host}/ws`);

  state.ws.onopen = () => {
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connected';
  };

  state.ws.onclose = () => {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent = 'Disconnected';
    setTimeout(connectWS, 2000);
  };

  state.ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleWSMessage(msg);
  };
}

function handleWSMessage(msg) {
  const section = document.getElementById('downloadsSection');
  section.classList.add('visible');

  if (msg.type === 'download_start') {
    state.downloads[msg.downloadId] = { title: msg.title, files: {}, totalFiles: msg.totalFiles, complete: false };
    renderDownloads();
  }

  if (msg.type === 'file_progress') {
    const dl = state.downloads[msg.downloadId];
    if (!dl) return;
    dl.files[msg.file] = msg;
    renderDownloads();
  }

  if (msg.type === 'download_complete') {
    const dl = state.downloads[msg.downloadId];
    if (!dl) return;
    dl.complete = true;
    dl.success = msg.success;
    dl.path = msg.path;
    renderDownloads();
  }
}

// --- Data ---
async function loadGames() {
  const resp = await fetch('/api/games');
  const data = await resp.json();
  state.games = data.games;
  state.filtered = [...state.games];

  // Populate host filter
  const hosts = new Set();
  state.games.forEach(g => Object.keys(g.hosts).forEach(h => { if (h !== 'magnet') hosts.add(h); }));
  const select = document.getElementById('hostFilter');
  hosts.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = hostName(h);
    select.appendChild(opt);
  });

  renderGames();
}

function hostName(h) {
  const names = {
    'datanodes.to': 'DataNodes', 'fuckingfast.co': 'FuckingFast', 'gofile.io': 'Gofile',
    'buzzheavier.com': 'Buzzheavier', 'vikingfile.com': 'VikingFile', 'pixeldrain.com': 'PixelDrain',
    'mediafire.com': 'MediaFire', 'mega.nz': 'Mega', '1fichier.com': '1Fichier',
    'filecrypt.cc': 'FileCrypt', '1337x.to': '1337x', 'rutor.info': 'RuTor', 'tapochek.net': 'Tapochek',
  };
  return names[h] || h;
}

function formatBytes(bytes) {
  if (!bytes) return '';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0;
  let b = bytes;
  while (b >= 1024 && i < units.length - 1) { b /= 1024; i++; }
  return `${b.toFixed(1)} ${units[i]}`;
}

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString(); } catch { return ''; }
}

// --- Render ---
function renderGames() {
  const list = document.getElementById('gameList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const hostF = document.getElementById('hostFilter').value;

  state.filtered = state.games.filter(g => {
    if (search && !g.title.toLowerCase().includes(search)) return false;
    if (hostF && !g.hosts[hostF]) return false;
    return true;
  });

  document.getElementById('gameCount').textContent = `${state.filtered.length} games`;

  list.innerHTML = state.filtered.map((g, i) => {
    const hosts = Object.entries(g.hosts)
      .filter(([k]) => k !== 'magnet')
      .map(([k, v]) => `<span class="host-badge">${v.name}</span>`)
      .join('');
    const sel = state.selected === i ? 'selected' : '';
    return `
      <div class="game-card ${sel}" onclick="selectGame(${i})">
        <div class="game-title">${escHtml(g.title)}</div>
        <div class="game-meta">
          <span class="game-size">${g.fileSize || '?'}</span>
          <span>${formatDate(g.uploadDate)}</span>
        </div>
        <div class="host-badges">${hosts}</div>
      </div>
    `;
  }).join('');
}

function selectGame(index) {
  state.selected = index;
  state.selectedHost = null;
  const game = state.filtered[index];

  document.getElementById('panelEmpty').style.display = 'none';
  document.getElementById('panelContent').style.display = 'block';
  document.getElementById('panelTitle').textContent = game.title;
  document.getElementById('panelSize').textContent = game.fileSize || 'Unknown';

  const hostOpts = document.getElementById('hostOptions');
  hostOpts.innerHTML = Object.entries(game.hosts)
    .filter(([k]) => k !== 'magnet' && k !== '1337x.to' && k !== 'rutor.info' && k !== 'tapochek.net')
    .map(([host, info]) => `
      <div class="host-option" onclick="selectHost('${host}', this)">
        <span class="host-option-name">${info.name}</span>
        <span class="host-option-count">${info.count} file${info.count > 1 ? 's' : ''}</span>
      </div>
    `).join('');

  // Add magnet option if available
  if (game.hosts.magnet) {
    hostOpts.innerHTML += `
      <div class="host-option" onclick="selectHost('magnet', this)">
        <span class="host-option-name">Magnet (Torrent)</span>
        <span class="host-option-count">${game.hosts.magnet.count} link${game.hosts.magnet.count > 1 ? 's' : ''}</span>
      </div>
    `;
  }

  document.getElementById('downloadBtn').disabled = true;
  renderGames();
}

function selectHost(host, el) {
  state.selectedHost = host;
  document.querySelectorAll('.host-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('downloadBtn').disabled = false;
}

async function startDownload() {
  if (state.selected === null || !state.selectedHost) return;
  const game = state.filtered[state.selected];

  if (state.selectedHost === 'magnet') {
    const magnet = game.uris.find(u => u.startsWith('magnet:'));
    if (magnet) window.open(magnet, '_blank');
    return;
  }

  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('downloadBtn').textContent = 'Starting...';

  const resp = await fetch('/api/download', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      title: game.title,
      uris: game.uris,
      host: state.selectedHost,
    }),
  });

  const data = await resp.json();
  document.getElementById('downloadBtn').textContent = 'Download';
  document.getElementById('downloadBtn').disabled = false;
}

function renderDownloads() {
  const list = document.getElementById('downloadsList');
  list.innerHTML = Object.entries(state.downloads).map(([id, dl]) => {
    const files = Object.values(dl.files).map(f => {
      let statusText = '';
      let statusClass = f.status;
      if (f.status === 'downloading' && f.total) {
        statusText = `${formatBytes(f.downloaded)} / ${formatBytes(f.total)}`;
      } else if (f.status === 'done') {
        statusText = 'Done';
      } else if (f.status === 'error') {
        statusText = 'Error';
      } else if (f.status === 'skipped') {
        statusText = 'Exists';
      }

      const pct = f.total ? Math.round((f.downloaded / f.total) * 100) : 0;

      return `
        <div class="dl-file">
          <span class="dl-file-name">${escHtml(f.file)}</span>
          <span class="dl-file-status ${statusClass}">${statusText}</span>
        </div>
        ${f.status === 'downloading' ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>` : ''}
      `;
    }).join('');

    const doneFiles = Object.values(dl.files).filter(f => f.status === 'done' || f.status === 'skipped').length;
    const overallPct = dl.totalFiles ? Math.round((doneFiles / dl.totalFiles) * 100) : 0;

    let footer = '';
    if (dl.complete && dl.success) {
      footer = `<div class="dl-complete">Download complete - ${escHtml(dl.path)}</div>`;
    } else if (dl.complete && !dl.success) {
      footer = `<div class="dl-error">Some files failed to download</div>`;
    }

    return `
      <div class="dl-item">
        <div class="dl-item-title">${escHtml(dl.title)} (${doneFiles}/${dl.totalFiles})</div>
        ${files}
        <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${overallPct}%;background:var(--green)"></div></div>
        ${footer}
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Events ---
document.getElementById('searchInput').addEventListener('input', renderGames);
document.getElementById('hostFilter').addEventListener('change', renderGames);
document.getElementById('downloadBtn').addEventListener('click', startDownload);

// --- Init ---
connectWS();
loadGames();
</script>
</body>
</html>
